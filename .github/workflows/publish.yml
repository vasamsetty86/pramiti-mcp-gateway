name: Publish to PyPI

# Publishes to PyPI on a version tag (e.g. `v0.1.0`) using PyPI Trusted
# Publishing (OIDC) — no API token or secret is stored in the repo.
# One-time PyPI setup is documented in PUBLISHING.md.

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[connect,sign]" pytest pytest-asyncio
      - run: pytest -q

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
